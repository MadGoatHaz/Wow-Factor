name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_benchmark_worker.py --timeout=60

      - name: Run benchmark worker tests
        run: |
          pytest tests/test_benchmark_worker.py -v --tb=short --timeout=60
        continue-on-error: true
